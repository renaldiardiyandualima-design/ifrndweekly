<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>TUGAS FORM (20 APRIL 2026)</h2>

    <form>
        <table border="0" cellspacing="0" cellpadding="5">
            <tr>
                <td>
                    <label for="name">Nama</label>
                </td>
                <td>:</td>
                <td>
                    <input type="text" name="name" id="name">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="nim">Nim</label>
                </td>
                <td>:</td>
                <td>
                    <input type="number" name="nim" id="nim">
                </td>
            </tr>

            <tr></tr>
                <td>
                    <label for="password">Password</label>
                </td>
                <td>:</td>
                <td>
                    <input type="password" name="password" id="password">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="email">Email</label>
                </td>
                <td>:</td>
                <td>
                    <input type="email" name="email" id="email">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="noHp">No.Hp</label>
                </td>
                <td>:</td>
                <td>
                    <input type="tel" name="noHp" id="noHp">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="website">Website Pribadi</label>
                </td>
                <td>:</td>
                <td>
                    <input type="url" name="website" id="website">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="tanggal">Tanggal Lahir</label>
                </td>
                <td>:</td>
                <td>
                    <input type="date" name="tanggal" id="tanggal">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="warna">Warna Favorit</label>
                </td>
                <td>:</td>
                <td>
                    <input type="color" name="warna" id="warna">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="kepuasan">Tingkat Kepuasan</label>
                </td>
                <td>:</td>
                <td>
                    <input type="range" name="kepuasan" id="kepuasan">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="JK">Jenis Kelamin</label>
                </td>
                <td>:</td>
                <td>
                    <input type="radio" name="JK" value="Laki-Laki"> Laki Laki
                    <input type="radio" name="JK" value="Perempuan"> Perempuan
                </td>
            </tr>

            <tr>
                <td>
                    <label>Hobi</label>
                </td>
                <td>:</td>
                <td>
                    <input type="checkbox" name="hobi" value="Push Rank">Push Rank
                    <input type="checkbox" name="hobi" value="Lari">Jogging
                    <input type="checkbox" name="hobi" value="Tidur">Tidur
                </td>
            </tr>

            <tr>
                <td>
                    <label>Upload Foto</label>
                </td>
                <td>:</td>
                <td>
                    <input type="file" name="foto">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="alamat">Alamat</label>
                    <td>:</td>
                    <td>
                        <input type="texarea" name="alamat">
                    </td>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="jurusan">jurusan</label>
                </td>
                <td>:</td>
                <td>
                    <input type="selec option" name="jurusan">
                </td>
            </tr>
        </table>
        <input type="submit" value="submit">
    </form>
</body>
</html>
